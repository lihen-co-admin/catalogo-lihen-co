[build]
  publish = "."

[[redirects]]
  from = "/inauguracion"
  to = "/inauguracion/"
  status = 301

[[redirects]]
  from = "/pantalla"
  to = "/inauguracion/pantalla.html"
  status = 302

[[redirects]]
  from = "/evento-admin"
  to = "/evento-admin.html"
  status = 302

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
